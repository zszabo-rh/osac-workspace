name: Skillsaw Review

# SECURITY: workflow_run uses the default branch context — never checks out PR
# code. Downloads the lint report artifact from the Skillsaw workflow and posts
# inline PR comments only. See https://skillsaw.org/ci/
on:
  workflow_run:
    workflows: ["Skillsaw"]
    types: [completed]

concurrency:
  # head_sha, not pull_requests[0].number: osac-workspace is fork-based, and
  # GitHub leaves workflow_run.pull_requests empty for PRs from forked repos
  # (see https://github.com/github/docs/issues/30093). head_sha is always
  # populated and unique per push, so do not swap this back to
  # pull_requests[0].number even though it reads more naturally.
  group: skillsaw-review-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read # download the Skillsaw lint report artifact
      pull-requests: write # post inline lint findings as PR comments
    steps:
      - uses: stbenjam/skillsaw/review@641606f379ebea086b31dec023366c7ff89301a2 # v0
