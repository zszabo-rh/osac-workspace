# HTTPRoute for AWX web UI — accessible at http://awx.awx.localhost:8080
# Requires the Gateway to have an HTTP listener on port 80
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: awx-external
  namespace: awx
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: envoy-gateway
    name: default
    sectionName: http
  hostnames:
  - awx.awx.localhost
  rules:
  - backendRefs:
    - name: awx-service
      port: 80
