# HTTPRoute for OSAC UI — accessible at http://ui.osac.localhost:8080
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: osac-ui
  namespace: osac
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    namespace: envoy-gateway
    name: default
    sectionName: http
  hostnames:
  - ui.osac.localhost
  rules:
  - backendRefs:
    - name: osac-ui
      port: 80
