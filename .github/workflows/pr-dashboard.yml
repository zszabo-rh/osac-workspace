name: PR Dashboard

on:
  schedule:
    - cron: "*/30 6-19 * * 0-5"
  push:
    branches: [main]
    paths:
      - 'presentations/**'
      - 'index.html'
      - '.github/workflows/pr-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-dashboard:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - name: Generate dashboard data
        working-directory: tools/pr-notify
        env:
          GH_TOKEN: ${{ secrets.OSAC_BOT_PAT }}
        run: |
          python generate.py \
            --config config.example.toml \
            --output ../../docs/pr-dashboard/data.json

      - name: Assemble site
        run: |
          mkdir -p _site/presentations
          cp index.html _site/
          cp -r docs/pr-dashboard _site/pr-dashboard
          cp presentations/*.html _site/presentations/
          cp -r presentations/assets _site/presentations/ 2>/dev/null || true

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: _site

      - uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
