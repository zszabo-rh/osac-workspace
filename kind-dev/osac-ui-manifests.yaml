apiVersion: v1
kind: ConfigMap
metadata:
  name: osac-ui
  namespace: osac
data:
  LOG_LEVEL: "info"
  FULFILLMENT_API_URL: "https://fulfillment-api.osac.svc.cluster.local:8000"
  FULFILLMENT_TLS_INSECURE: "1"
  OIDC_TLS_INSECURE: "1"
  OIDC_CLIENT_ID: "osac-ui"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: osac-ui
  namespace: osac
  labels:
    app: osac-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: osac-ui
  template:
    metadata:
      labels:
        app: osac-ui
    spec:
      containers:
      - name: osac-ui
        image: ghcr.io/osac-project/osac-ui:latest
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        envFrom:
        - configMapRef:
            name: osac-ui
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: osac-ui
  namespace: osac
  labels:
    app: osac-ui
spec:
  selector:
    app: osac-ui
  ports:
  - name: http
    port: 80
    targetPort: http
