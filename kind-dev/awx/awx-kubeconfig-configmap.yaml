# Template for creating the AWX kubeconfig ConfigMap
# The actual kubeconfig must be generated at deploy time with a fresh SA token.
# See setup instructions in README.md.
#
# Generate with:
#   kubectl -n osac create serviceaccount awx-runner
#   kubectl create clusterrolebinding awx-runner-admin --clusterrole=cluster-admin --serviceaccount=osac:awx-runner
#   AWX_TOKEN=$(kubectl -n osac create token awx-runner --duration=87600h)
#   CLUSTER_CA=$(kubectl config view --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}')
#   # Then create the configmap with the generated kubeconfig
