<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OSAC PR Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Red Hat Display",system-ui,sans-serif;background:#f5f5f5;color:#151515;line-height:1.5}
.container{max-width:960px;margin:0 auto;padding:24px 16px}
header{margin-bottom:24px}
header h1{font-size:1.5rem;color:#151515}
header .updated{color:#6a6e73;font-size:.85rem}
.cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:32px}
.card{background:#fff;border-radius:8px;padding:16px 20px;min-width:120px;flex:1;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.card-num{font-size:1.8rem;font-weight:700}
.card-label{font-size:.85rem;color:#6a6e73}
section{margin-bottom:32px}
h2{font-size:1.15rem;margin-bottom:12px}
h2 a{color:#151515;text-decoration:none}
h2 a:hover{text-decoration:underline}
.pr-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.pr-table th{text-align:left;padding:10px 12px;background:#f0f0f0;font-size:.8rem;text-transform:uppercase;color:#6a6e73}
.pr-table td{padding:10px 12px;border-top:1px solid #eee;font-size:.9rem;vertical-align:top}
.pr-table td a{color:#06c;text-decoration:none}
.pr-table td a:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;color:#fff;font-size:.75rem;white-space:nowrap}
.age-stale{color:#c9190b;font-weight:700}
details summary{cursor:pointer;color:#06c;font-size:.85rem}
.checks{margin-top:6px;font-size:.8rem;border-collapse:collapse}
.checks td{padding:3px 8px;border:none}
.muted{color:#6a6e73;font-style:italic}
.bar-bg{display:inline-block;width:100px;height:10px;background:#eee;border-radius:5px;vertical-align:middle;margin-right:6px}
.bar{height:100%;border-radius:5px}
.all-clear{text-align:center;color:#3e8635;font-size:1.2rem;padding:40px 0}
footer{text-align:center;color:#6a6e73;font-size:.8rem;margin-top:40px;padding-top:16px;border-top:1px solid #ddd}
.loading{text-align:center;padding:60px 0;color:#6a6e73;font-size:1rem}
.error{text-align:center;padding:60px 0;color:#c9190b;font-size:1rem}
</style>
</head>
<body>
<div class="container">
<header>
<h1>OSAC PR Dashboard</h1>
<div class="updated" id="updated">Loading...</div>
</header>
<div id="content">
<div class="loading">Loading dashboard data...</div>
</div>
<footer>Generated by pr-notify</footer>
</div>
<script>
const STATUS_COLORS = {
  needs_review: "#f0ab00",
  needs_re_review: "#f0ab00",
  changes_requested: "#c9190b",
  ci_failing: "#c9190b",
  conflicts: "#8a6d3b",
  approved: "#3e8635",
  draft: "#6a6e73"
};
const STATUS_LABELS = {
  needs_review: "needs review",
  needs_re_review: "needs re-review",
  changes_requested: "changes requested",
  ci_failing: "CI failing",
  conflicts: "conflicts",
  approved: "approved",
  draft: "draft"
};
const CONCLUSION_STYLES = {
  SUCCESS: ["#3e8635", "Pass"],
  FAILURE: ["#c9190b", "Fail"],
  NEUTRAL: ["#6a6e73", "Neutral"],
  SKIPPED: ["#6a6e73", "Skip"],
  CANCELLED: ["#6a6e73", "Cancel"],
  TIMED_OUT: ["#c9190b", "Timeout"],
  ACTION_REQUIRED: ["#f0ab00", "Action"]
};
const PENDING_STYLE = ["#6a6e73", "Pending"];

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function badge(status) {
  const color = STATUS_COLORS[status] || "#6a6e73";
  const label = STATUS_LABELS[status] || status;
  return '<span class="badge" style="background:' + color + '">' + esc(label) + "</span>";
}

function checkRunRows(checks) {
  if (!checks || !checks.length) {
    return '<tr><td colspan="2" class="muted">No check data</td></tr>';
  }
  return checks.map(function(cr) {
    const style = CONCLUSION_STYLES[cr.conclusion] || PENDING_STYLE;
    const name = cr.details_url
      ? '<a href="' + esc(cr.details_url) + '">' + esc(cr.name) + "</a>"
      : esc(cr.name);
    return "<tr><td>" + name + '</td><td style="color:' + style[0] + ';font-weight:600">' + style[1] + "</td></tr>";
  }).join("\n");
}

function renderCards(summary) {
  const cards = [
    ["Needs Review", summary.needs_review, "#f0ab00"],
    ["CI Failing", summary.ci_failing, "#c9190b"],
    ["Conflicts", summary.conflicts || 0, "#8a6d3b"],
    ["Stale (7+ days)", summary.stale, "#6a6e73"],
    ["Approved", summary.approved, "#3e8635"],
    ["Draft", summary.draft, "#6a6e73"]
  ];
  return '<div class="cards">' + cards.map(function(c) {
    return '<div class="card" style="border-top:4px solid ' + c[2] + '">' +
      '<div class="card-num">' + c[1] + '</div><div class="card-label">' + esc(c[0]) + "</div></div>";
  }).join("\n") + "</div>";
}

function renderRepo(repo) {
  var actionable = repo.prs.filter(function(pr) {
    return pr.status !== "draft" && pr.status !== "approved";
  });
  if (!actionable.length) return "";

  var rows = actionable.map(function(pr) {
    var ageClass = pr.age_days >= 7 ? "age-stale" : "";
    var checksHtml = checkRunRows(pr.check_runs);
    return "<tr>" +
      "<td>" + badge(pr.status) + "</td>" +
      '<td><a href="' + esc(pr.url) + '">' + esc(pr.title) + "</a></td>" +
      '<td><a href="https://github.com/' + esc(pr.author) + '">' + esc(pr.author) + "</a></td>" +
      '<td class="' + ageClass + '">' + pr.age_days + "d</td>" +
      '<td><details><summary>checks</summary><table class="checks">' + checksHtml + "</table></details></td>" +
      "</tr>";
  });

  return "<section>" +
    '<h2><a href="' + esc(repo.pulls_url) + '">' + esc(repo.name) + "</a> (" + actionable.length + ")</h2>" +
    '<table class="pr-table">' +
    "<thead><tr><th>Status</th><th>Title</th><th>Author</th><th>Age</th><th>CI</th></tr></thead>" +
    "<tbody>" + rows.join("") + "</tbody>" +
    "</table></section>";
}

function renderCIHealth(ciHealth) {
  if (!ciHealth || !ciHealth.length) return "";
  var rows = ciHealth.map(function(r) {
    var color = r.pass_rate >= 80 ? "#3e8635" : r.pass_rate >= 50 ? "#f0ab00" : "#c9190b";
    return "<tr><td>" + esc(r.repo) + "</td><td>" + r.total_checks + "</td>" +
      '<td><div class="bar-bg"><div class="bar" style="width:' + r.pass_rate + "%;background:" + color + '"></div></div>' +
      r.pass_rate + "%</td></tr>";
  });
  return "<section><h2>CI Health</h2>" +
    '<table class="pr-table">' +
    "<thead><tr><th>Repo</th><th>Checks</th><th>Pass Rate</th></tr></thead>" +
    "<tbody>" + rows.join("") + "</tbody></table></section>";
}

function render(data) {
  document.getElementById("updated").textContent = "Last updated: " + data.generated_at;
  var html = renderCards(data.summary);

  var repoSections = data.repos.map(renderRepo).filter(Boolean);
  if (!repoSections.length) {
    html += '<p class="all-clear">All clear - no actionable PRs</p>';
  } else {
    html += repoSections.join("");
  }

  html += renderCIHealth(data.ci_health);
  document.getElementById("content").innerHTML = html;
}

fetch("data.json")
  .then(function(r) {
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  })
  .then(render)
  .catch(function(err) {
    document.getElementById("content").innerHTML =
      '<div class="error">Failed to load dashboard data: ' + esc(err.message) + "</div>";
  });
</script>
</body>
</html>
