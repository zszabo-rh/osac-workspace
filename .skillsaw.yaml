# skillsaw configuration
# https://github.com/stbenjam/skillsaw
#
# Lint scope: skillsaw lint . with blacklist excludes below (see Makefile,
# .github/workflows/skillsaw.yml).

version: "0.17.0"

rules:

  # Agent files must have valid frontmatter with name and description
  agent-frontmatter:
    enabled: true
    severity: error

  # Skill description should be meaningful and within length limits
  agentskill-description:
    enabled: auto
    severity: warning
    # max_length: 1024

  # Validate evals/evals.json format when present
  agentskill-evals:
    enabled: auto
    severity: warning

  # Require evals/evals.json for each skill (opt-in)
  agentskill-evals-required:
    enabled: false
    severity: warning

  # Skill name must be lowercase letters, numbers, and hyphens and match directory name
  agentskill-name:
    enabled: auto
    severity: error

  # Update stale skill name references after a rename
  agentskill-rename-refs:
    enabled: auto
    severity: warning
    # autofix-min-segments: 2

  # Skill directories should only contain recognized subdirectories (stricter than spec)
  agentskill-structure:
    enabled: auto
    severity: warning
    allowed_dirs:
      - assets
      - evals
      - references
      - scripts
      - steps

  # Every bundled skill file should be referenced from SKILL.md, directly or transitively
  agentskill-unreferenced-files:
    enabled: auto
    severity: warning
    # Per-rule exclude is skill-relative (GUIDE.md not prd/GUIDE.md). Upstream prd
    # ships human-only GUIDE.md unreferenced from SKILL.md — workaround until ai-workflows moves it.
    exclude:
      - "GUIDE.md"

  # SKILL.md must have valid frontmatter with name and description
  agentskill-valid:
    enabled: auto
    severity: error
    # required-fields: []
    # required-metadata: []

  # .apm/ directory must contain skills/ or instructions/ with valid structure
  apm-structure-valid:
    enabled: auto
    severity: warning

  # apm.yml must exist with valid YAML and required fields (name, version, description)
  apm-yaml-valid:
    enabled: auto
    severity: error

  # .coderabbit.yaml must be valid YAML
  coderabbit-yaml-valid:
    enabled: auto
    severity: error

  # Command files must have valid frontmatter with description
  command-frontmatter:
    enabled: true
    severity: error

  # Command Name section should be 'plugin-name:command-name'
  command-name-format:
    enabled: false
    severity: warning

  # Command files should use kebab-case naming
  command-naming:
    enabled: true
    severity: warning

  # Command files should have Name, Synopsis, Description, and Implementation sections
  command-sections:
    enabled: false
    severity: warning

  # Score instruction files on actionability (verb density, commands, file references)
  content-actionability-score:
    enabled: auto
    severity: info

  # Detect banned or deprecated model names, APIs, and custom patterns
  content-banned-references:
    enabled: auto
    severity: warning
    # banned: []
    # skip-builtins: false
    # regex-timeout: 2.0

  # Detect markdown links where the target file does not exist
  # OSAC skills reference workspace-root paths (presentations/, fulfillment-service/, …)
  # outside skills/ — downgrade to info; see AGENTS.md skill authoring conventions.
  content-broken-internal-reference:
    enabled: auto
    severity: info

  # Check that instruction files are organized into cognitive chunks with headings
  content-cognitive-chunks:
    enabled: auto
    severity: info

  # Detect likely contradictions within instruction files using keyword-pair heuristics
  content-contradiction:
    enabled: auto
    severity: warning

  # Detect critical instructions in the middle of files where LLM attention is lowest
  content-critical-position:
    enabled: auto
    severity: warning
    # min-lines: 50

  # Detect potential API keys, tokens, and passwords in instruction files
  content-embedded-secrets:
    enabled: auto
    severity: error
    # entropy-threshold: 3.5
    # additional-placeholders: []

  # Detect instructions that should be automated as hooks instead of prose instructions
  # The buf-lint suggestion this rule raises on protobuf-conventions.md is
  # already covered: bootstrap.sh installs a pre-commit hook (buf-lint,
  # golangci-lint) into fulfillment-service and other component repos that
  # ship a .pre-commit-config.yaml. A Claude Code PostToolUse hook would be
  # additive at best (git-level enforcement already runs) and would only
  # cover Claude Code sessions, not Cursor/Gemini CLI — accepted as info,
  # not pursued further.
  content-hook-candidate:
    enabled: auto
    severity: info

  # Detect inconsistent terminology across instruction files (e.g., mixing 'directory' and 'folder')
  # Raised from info (0.16.0 default) now that stbenjam/skillsaw#427 is fixed in 0.17.0:
  # headings and inline-code path segments no longer count as prose terminology
  # choices, so the remaining hits are genuine drift, not directory-name or
  # heading false positives. function/method stays off — Go's Create()/Update()
  # methods legitimately coexist with "function" used as a verb elsewhere.
  content-inconsistent-terminology:
    enabled: auto
    severity: warning
    groups:
      function/method: off

  # Check if instruction count in a file exceeds LLM instruction budget (~150)
  content-instruction-budget:
    enabled: auto
    severity: warning

  # Detect prohibitions without a positive alternative (agent has no path forward)
  content-negative-only:
    enabled: auto
    severity: warning

  # Detect TODO markers, bracket placeholders, and unfilled template text
  content-placeholder-text:
    enabled: auto
    severity: warning

  # Detect instructions that duplicate .editorconfig, ESLint, Prettier, or tsconfig settings
  content-redundant-with-tooling:
    enabled: auto
    severity: warning

  # Warn about markdown sections longer than ~500 tokens
  content-section-length:
    enabled: auto
    severity: info
    # max-tokens: 500

  # Detect tautological instructions that the model already follows by default
  content-tautological:
    enabled: auto
    severity: warning

  # Detect bare path-like strings not wrapped in markdown link syntax
  # OSAC's skill authoring conventions (AGENTS.md) intentionally keep
  # workspace-root and cross-component paths as backtick text, not markdown
  # links — reserving links for paths inside a skill's own directory. The
  # remaining info-level violations on AGENTS.md / .claude/rules/*.md /
  # cross-component paths are this accepted exception, not an oversight.
  content-unlinked-internal-reference:
    enabled: auto
    severity: info
    # patterns:
    #   - ./**/*.*
    #   - references/**/*.md

  # Detect hedging, vague, and non-actionable language in instruction files
  content-weak-language:
    enabled: auto
    severity: warning

  # Warn when instruction or config files exceed recommended token limits
  context-budget:
    enabled: auto
    severity: warning
    limits:
      skill:
        warn: 5000
        error: 10000
    #   command:
    #     warn: 2000
    #     error: 4000
    #   agent:
    #     warn: 2000
    #     error: 4000
    #   rule:
    #     warn: 2000
    #     error: 4000
    #   skill-description:
    #     warn: 200
    #     error: 500
    #   command-description:
    #     warn: 200
    #     error: 500

  # Flags hook commands that execute scripts from dotfile directories, download-and-execute chains (curl|sh), obfuscation (eval/base64), or perform network requests
  hooks-dangerous:
    enabled: auto
    severity: error
    allowlist:
      # Was "bash .claude/hooks/update-ai-context.sh" — updated to an
      # absolute path via CLAUDE_PROJECT_DIR so the hook still resolves when
      # invoked with cwd elsewhere than the workspace root. Allowlist match
      # is a strict exact string, so this had to move with the command.
      - "bash \"${CLAUDE_PROJECT_DIR}/.claude/hooks/update-ai-context.sh\""

  # hooks.json must be valid JSON with proper hook configuration structure
  hooks-json-valid:
    enabled: true
    severity: error

  # All hook commands are prohibited unless explicitly allowlisted; catches new or unexpected hooks added to a project
  hooks-prohibited:
    enabled: false
    severity: error
    # allowlist: []

  # Instruction files (AGENTS.md, CLAUDE.md, GEMINI.md) must be valid and non-empty
  instruction-file-valid:
    enabled: auto
    severity: warning

  # Import references (@path) in AGENTS.md, CLAUDE.md, and GEMINI.md must point to existing files
  instruction-imports-valid:
    enabled: auto
    severity: warning

  # Marketplace.json must be valid JSON with required fields
  marketplace-json-valid:
    enabled: auto
    severity: error

  # Plugins must be registered in marketplace.json
  marketplace-registration:
    enabled: auto
    severity: error

  # Repository should not enable non-allowlisted MCP servers
  mcp-prohibited:
    enabled: false
    severity: error
    # allowlist: []

  # MCP configuration must be valid JSON with proper mcpServers structure
  mcp-valid-json:
    enabled: true
    severity: error

  # Validate metadata.openclaw fields against the openclaw spec
  openclaw-metadata:
    enabled: auto
    severity: warning

  # Plugin must have .claude-plugin/plugin.json
  plugin-json-required:
    enabled: auto
    severity: error

  # plugin.json must be valid JSON with required fields
  plugin-json-valid:
    enabled: auto
    severity: error
    # recommended-fields:
    #   - description
    #   - version
    #   - author

  # Plugin names should use kebab-case
  plugin-naming:
    enabled: auto
    severity: warning

  # Plugin should have a README.md file
  plugin-readme:
    enabled: auto
    severity: warning

  # Require specific assertion types in all promptfoo eval tests
  promptfoo-assertions:
    enabled: false
    severity: warning
    # required-types: []
    # threshold-constraints: {}

  # Require specific metadata keys on all promptfoo eval tests
  promptfoo-metadata:
    enabled: false
    severity: warning
    # required-keys: []

  # Validate promptfoo eval YAML config structure and file references
  promptfoo-valid:
    enabled: auto
    severity: error

  # .claude/rules/ files must be markdown with valid optional paths frontmatter
  rules-valid:
    enabled: auto
    severity: error

  # Flags settings keys that execute arbitrary commands (apiKeyHelper, awsAuthRefresh, awsCredentialExport, gcpAuthRefresh, otelHeadersHelper) and dangerous env vars (LD_PRELOAD, NODE_OPTIONS, proxy settings, GIT_SSH_COMMAND, etc.)
  settings-dangerous:
    enabled: auto
    severity: error
    # allow_command_exec_keys: []
    # allow_env_vars: []

  # SKILL.md files should have frontmatter with name and description
  skill-frontmatter:
    enabled: true
    severity: warning

# Load custom rules from these files
custom-rules: []

# Rule plugins (pip-installed packages that add rules)
# https://skillsaw.org/plugins/
# plugins:
#     enabled: true
#     disable: ["some-plugin-name"]

# Blacklist: bootstrap-managed and non-canonical paths (see bootstrap.sh, .gitignore).
exclude:
  # Agent dirs: symlinks to skills/ or gitignored
  - ".cursor/**"
  - ".gemini/**"
  - ".claude/skills/**"
  - ".claude/commands/**"
  - ".claude/agents/**"
  # ai-workflows skill symlinks under skills/ (gitignored; absent in CI)
  - "**/bugfix/**"
  - "**/design/**"
  - "**/e2e/**"
  - "**/implement/**"
  - "**/prd/**"
  - "**/_shared/**"
  # Bootstrap component clones (present locally after bootstrap.sh)
  - "fulfillment-service/**"
  - "osac-operator/**"
  - "osac-aap/**"
  - "osac-docs/**"
  - "osac-installer/**"
  - "osac-test-infra/**"
  - "osac-ui/**"
  - "enhancement-proposals/**"
  - "bare-metal-fulfillment-operator/**"
  - "host-management-openstack/**"
  - "osac-ux/**"
  - ".ai-workflows/**"
  # Workspace artifacts and generated content
  - ".artifacts/**"
  - "docs/pr-dashboard/data.json"

# Treat warnings as errors
strict: true
